<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M_Eroufel | Space</title>
    <style>
        /* --- المتغيرات والتنسيق الأساسي --- */
        :root {
            --bg: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #1a1a1a;
            --accent: #007bff;
            --blur: blur(10px);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        body.dark-theme {
            --bg: #0f1011;
            --card-bg: rgba(30, 31, 34, 0.8);
            --text: #e0e0e0;
            --accent: #3f9eff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- الواجهة الأمامية --- */
        header {
            padding: 30px 20px 10px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin: 0;
        }

        .version-badge {
            display: inline-block;
            font-size: 0.7rem;
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 5px;
            font-weight: bold;
            opacity: 0.9;
        }

        #main-content {
            flex: 1;
            padding: 10px 20px 100px 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .tab-content {
            display: none;
            animation: slideUp 0.5s ease forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- الأقسام المصممة بشكل زجاجي --- */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        /* --- الإعدادات --- */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }

        .setting-row:last-child { border: none; }

        /* مفتاح التبديل (Switch) */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* --- الأعمال --- */
        .empty-state {
            border: 2px dashed rgba(128, 128, 128, 0.3);
            border-radius: 15px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gray;
            font-style: italic;
        }

        /* --- الروابط الشخصية --- */
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            margin-top: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .social-link:hover { opacity: 0.9; transform: scale(1.02); }
        .social-link.tiktok { background: #000; }
        .social-link.insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        /* --- شريط التنقل السفلي --- */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text);
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            opacity: 0.6;
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
            opacity: 1;
        }

        /* --- التوقيع الخاص بك --- */
        .signature {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            font-family: serif;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        .hide-emojis .emoji { display: none; }
    </style>
</head>
<body class="light-theme">

    <header>
        <h1 id="main-title">M_EROUFEL <span class="emoji">🛡️</span></h1>
        <div class="version-badge">1.0.0 beta</div>
    </header>

    <main id="main-content">
        <section id="settings" class="tab-content active">
            <div class="glass-card">
                <h3 id="set-title">الإعدادات <span class="emoji">⚙️</span></h3>
                <div class="setting-row">
                    <span id="dark-text">الوضع الداكن</span>
                    <label class="switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <span id="emoji-text">الرموز التعبيرية (Emoji)</span>
                    <label class="switch">
                        <input type="checkbox" id="emojiToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <span id="lang-text">اللغة</span>
                    <select id="langSelect" style="background: none; color: var(--text); border-radius: 5px; padding: 2px;">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>
        </section>

        <section id="works" class="tab-content">
            <div class="glass-card">
                <h3 id="work-title">أعمالي <span class="emoji">💻</span></h3>
                <div id="empty-msg" class="empty-state">لا يوجد شيء هنا حالياً</div>
            </div>
        </section>

        <section id="about" class="tab-content">
            <div class="glass-card" style="text-align: center;">
                <h3 id="about-title">عني <span class="emoji">👤</span></h3>
                <p id="bio-text">مرحباً! أنا مروان، صانع محتوى تقني ومهتم بالبرمجة.</p>
                
                <a href="https://marwan_mrf22.github.io" id="site-link" class="social-link" target="_blank">الموقع الرسمي</a>
                <a href="https://www.tiktok.com/@marwan_mrf_22" class="social-link tiktok" target="_blank">TikTok</a>
                <a href="https://www.instagram.com/m.rf0.9" id="insta-link" class="social-link insta" target="_blank">انستجرام</a>
            </div>
        </section>

        <div class="signature">
            b𝖄 𝕸_•𝕰𝖗𝖔𝖚𝖋𝖊𝖑
        </div>
    </main>

    <nav class="bottom-nav">
        <button id="nav-set" class="nav-item active" onclick="switchTab(event, 'settings')">الإعدادات</button>
        <button id="nav-work" class="nav-item" onclick="switchTab(event, 'works')">أعمالي</button>
        <button id="nav-about" class="nav-item" onclick="switchTab(event, 'about')">عني</button>
    </nav>

    <script>
        // --- نظام اللغات المتطور ---
        const translations = {
            ar: {
                mainTitle: "M_EROUFEL 🛡️",
                setTitle: "الإعدادات ⚙️",
                darkText: "الوضع الداكن",
                emojiText: "الرموز التعبيرية (Emoji)",
                langText: "اللغة",
                workTitle: "أعمالي 💻",
                emptyMsg: "لا يوجد شيء هنا حالياً",
                aboutTitle: "عني 👤",
                bioText: "مرحباً! أنا مروان، صانع محتوى تقني ومهتم بالبرمجة.",
                siteLink: "الموقع الرسمي",
                instaLink: "انستجرام",
                navSet: "الإعدادات",
                navWork: "أعمالي",
                navAbout: "عني"
            },
            en: {
                mainTitle: "M_EROUFEL 🛡️",
                setTitle: "Settings ⚙️",
                darkText: "Dark Mode",
                emojiText: "Emoji Usage",
                langText: "Language",
                workTitle: "My Works 💻",
                emptyMsg: "Nothing here yet",
                aboutTitle: "About 👤",
                bioText: "Hello! I'm Marwan, a tech content creator interested in programming.",
                siteLink: "Official Site",
                instaLink: "Instagram",
                navSet: "Settings",
                navWork: "Works",
                navAbout: "About"
            }
        };

        function updateLanguage(lang) {
            document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';
            const t = translations[lang];
            
            document.getElementById('main-title').innerHTML = t.mainTitle;
            document.getElementById('set-title').innerHTML = t.setTitle;
            document.getElementById('dark-text').innerText = t.darkText;
            document.getElementById('emoji-text').innerText = t.emojiText;
            document.getElementById('lang-text').innerText = t.langText;
            document.getElementById('work-title').innerHTML = t.workTitle;
            document.getElementById('empty-msg').innerText = t.emptyMsg;
            document.getElementById('about-title').innerHTML = t.aboutTitle;
            document.getElementById('bio-text').innerText = t.bioText;
            document.getElementById('site-link').innerText = t.siteLink;
            document.getElementById('insta-link').innerText = t.instaLink;
            document.getElementById('nav-set').innerText = t.navSet;
            document.getElementById('nav-work').innerText = t.navWork;
            document.getElementById('nav-about').innerText = t.navAbout;
        }

        // --- إدارة الأقسام ---
        function switchTab(event, tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- ميزة الحفظ التلقائي ---
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-theme');
            darkModeToggle.checked = true;
        }

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
            }
        });

        // --- التحكم في الإيموجي ---
        const emojiToggle = document.getElementById('emojiToggle');
        emojiToggle.addEventListener('change', () => {
            body.classList.toggle('hide-emojis', !emojiToggle.checked);
        });

        // --- تغيير اللغة ---
        document.getElementById('langSelect').addEventListener('change', (e) => {
            updateLanguage(e.target.value);
        });
    </script>
</body>
</html>
